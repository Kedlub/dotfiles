customCommands:
  - key: "C"
    context: "files"
    description: "Generate commit with Claude"
    command: |
      # Generate commit message with spinner
      COMMIT_MSG=$(gum spin --spinner dot --title "Generating commit message..." -- \
        claude --no-session-persistence -p 'generate a 50/72 conventional commit according to the current staged changes. take into account only staged changes and nothing else. IMPORTANT: output just the commit text and nothing else. do not use markdown formatting. do not comment your thoughts' --output-format text)

      # Show preview and let user edit
      FINAL_MSG=$(echo "$COMMIT_MSG" | gum write --placeholder "Edit commit message...")

      # Commit if not empty
      if [ -n "$FINAL_MSG" ]; then
        git commit -m "$FINAL_MSG"
        echo "✓ Committed successfully!"
      else
        echo "✗ Commit cancelled"
      fi
    output: terminal

os:
  editPreset: nvim
  editInTerminal: true
promptToReturnFromSubprocess: false

git:
  pagers:
    - pager: delta --dark --paging=never
  autoForwardBranches: allBranches

gui:
  nerdFontsVersion: "3"
